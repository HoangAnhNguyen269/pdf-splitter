<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>PDF Splitter Pro</title>

  <style>
    :root{
      --bg1:#fff7fb;
      --bg2:#f2fbff;
      --card:rgba(255,255,255,.78);
      --line:rgba(20,40,80,.12);
      --text:#1c2a44;
      --muted:#66789a;
      --accent:#7c5cff;
      --good:#22c55e;
      --danger:#ff4d6d;
      --r:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;padding:16px;color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto;
      background:
              radial-gradient(1200px 650px at 18% 8%, rgba(124,92,255,.18), transparent 55%),
              radial-gradient(900px 520px at 92% 14%, rgba(34,197,94,.15), transparent 60%),
              linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }
    .wrap{max-width:1100px;margin:auto}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r);
      padding:14px;
      margin-top:14px;
      backdrop-filter:blur(8px);
    }
    .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    .spacer{flex:1}
    .muted{color:var(--muted);font-size:13px}

    button{
      padding:10px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:white;
      cursor:pointer;
      transition:.12s transform ease,.12s background ease;
    }
    button:hover{transform:translateY(-1px)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .btn-accent{background:rgba(124,92,255,.14)}
    .btn-good{background:rgba(34,197,94,.14)}
    .btn-bad{background:rgba(255,77,109,.14)}

    input[type=file],input[type=text],input[type=number]{
      padding:10px;border-radius:14px;border:1px solid var(--line);
      background:rgba(255,255,255,.92);
    }
    input[type=file]{background:rgba(255,255,255,.75)}

    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{
      padding:9px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      cursor:pointer;
      background:rgba(255,255,255,.75);
      user-select:none;
    }
    .tab.active{
      background:rgba(124,92,255,.18);
      border-color:rgba(124,92,255,.25);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
      gap:10px;margin-top:12px
    }
    .pageCard{
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      background:white;
      cursor:pointer;
    }
    .thumb{
      height:150px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#f8f8ff;
    }
    .pageMeta{
      padding:8px 10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
    }
    .checkbox{transform:scale(1.05)}

    .box{
      border:1px solid var(--line);
      background:white;
      border-radius:14px;
      padding:12px;
      margin-top:10px;
    }
    .boxHead{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .boxHead input{min-width:220px}
    .boxBody{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}

    a.dl{
      display:inline-block;
      margin:8px 10px 0 0;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.92);
      color:var(--text);
      text-decoration:none;
    }

    /* Responsive */
    @media(max-width:720px){
      body{padding:10px}
      .tab{flex:1;text-align:center}
      input[type=file]{width:100%}
      .grid{grid-template-columns:repeat(2,1fr);gap:8px}
      .thumb{height:120px}
      .boxHead input{min-width:0;width:100%}
    }

    /* Viewer modal */
    #viewerOverlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(8px);
      display:none;
      z-index:999;
      padding:10px;
    }
    #viewerCard{
      background:white;
      height:100%;
      max-width:980px;
      margin:0 auto;
      border-radius:16px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    #viewerTop,#viewerBottom{
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:10px;
      background:#f3f3ff;
      border-bottom:1px solid rgba(20,40,80,.10);
    }
    #viewerBottom{
      border-top:1px solid rgba(20,40,80,.10);
      border-bottom:none;
      background:#f2fff6;
    }
    #viewerBody{
      flex:1;
      overflow:auto;
      padding:10px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #viewerCanvas{
      width:100%;
      height:auto;
      max-height:calc(100vh - 140px);
      border-radius:12px;
      border:1px solid rgba(20,40,80,.12);
      background:white;
    }
  </style>
</head>

<body>
<div class="wrap">

  <div class="row" style="gap:12px;">
    <div>
      <div style="font-weight:800;font-size:20px;">PDF Splitter Pro</div>
      <div class="muted">Chạy 100% trên trình duyệt: upload PDF → chọn trang hoặc nhập khoảng → tách PDF/ZIP.</div>
    </div>
    <div class="spacer"></div>
    <div class="tabs">
      <div id="tabPick" class="tab active">Chọn trang</div>
      <div id="tabRange" class="tab">Tách theo khoảng</div>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <input id="pdfFile" type="file" accept="application/pdf"/>
      <button id="btnLoad" class="btn-accent" disabled>Đọc PDF</button>
      <div id="info" class="muted">Chưa có file</div>
      <div class="spacer"></div>
      <label class="muted" style="display:flex;gap:8px;align-items:center;">
        <input id="makeZip" type="checkbox" class="checkbox" checked/> Tải ZIP
      </label>
      <button id="btnSplit" class="btn-good" disabled>Tách ngay</button>
    </div>
    <div id="status" class="muted" style="margin-top:8px;"></div>
    <div id="error" style="color:var(--danger);margin-top:8px;"></div>
  </div>

  <!-- Mode A -->
  <div id="modePick" class="card">
    <div class="row">
      <div id="pickCounter" class="muted">Selected: 0</div>
      <div class="spacer"></div>
      <button id="btnPrev">←</button>
      <div id="windowLabel" class="muted"></div>
      <button id="btnNext">→</button>
    </div>

    <div class="row" style="margin-top:10px;">
      <button id="btnSelectVisible">Chọn hết (đang hiện)</button>
      <button id="btnClearVisible">Bỏ chọn (đang hiện)</button>
      <button id="btnClearAll" class="btn-bad">Bỏ chọn hết</button>
      <div class="spacer"></div>
      <button id="btnCreateFileFromSelection" class="btn-accent" disabled>+ Tạo file từ selection</button>
    </div>

    <div id="pageGrid" class="grid"></div>

    <div style="margin-top:12px;">
      <div style="font-weight:700;margin-bottom:6px;">Danh sách file sẽ tách (Mode A)</div>
      <div id="pickBoxes"></div>
    </div>
  </div>

  <!-- Mode B -->
  <div id="modeRange" class="card" style="display:none;">
    <div class="row">
      <button id="btnAddRangeBox" class="btn-accent">+ Thêm box</button>
      <button id="btnExampleRange">Ví dụ (167–1818)</button>
      <div class="spacer"></div>
      <div class="muted">Mỗi box: tên file + from/to.</div>
    </div>
    <div id="rangeBoxes"></div>
  </div>

  <div id="downloads" class="card" style="display:none;"></div>

</div>

<!-- Viewer Modal -->
<div id="viewerOverlay">
  <div id="viewerCard">
    <div id="viewerTop">
      <div id="viewerPageLabel" class="muted"></div>
      <div class="spacer"></div>
      <button id="viewerClose" class="btn-bad">Đóng</button>
    </div>

    <div id="viewerBody">
      <canvas id="viewerCanvas"></canvas>
    </div>

    <div id="viewerBottom">
      <button id="viewerPrev" class="btn-accent">←</button>
      <button id="viewerNext" class="btn-accent">→</button>
      <div class="spacer"></div>
      <label class="muted" style="display:flex;gap:8px;align-items:center;">
        <input id="viewerCheck" type="checkbox" class="checkbox"/> Chọn trang này
      </label>
      <input id="viewerJump" type="number" min="1" placeholder="Go" style="width:90px;"/>
      <button id="viewerGo" class="btn-accent">Go</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="app.js"></script>
</body>
</html>
